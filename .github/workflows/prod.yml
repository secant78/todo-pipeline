name: Deploy — Production

on:
  push:
    branches: [main]

# Only one prod deployment at a time; never cancel in progress — let it finish
# or fail, then rollback.
concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  AWS_REGION:       us-east-1
  TF_WORKSPACE:     prod
  IMAGE_TAG:        prod-${{ github.sha }}
  CLUSTER_NAME:     todo-prod
  BACKEND_SERVICE:  todo-prod-backend
  FRONTEND_SERVICE: todo-prod-frontend

jobs:

  # ── Stage 1: tests, audits, SAST, IaC scan ─────────────────────────────────
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: read
      security-events: write

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: todo
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: todo
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install backend dev dependencies
        run: pip install -r backend/requirements-dev.txt

      - name: Backend tests
        working-directory: backend
        env:
          DB_HOST: localhost
          DB_PORT: "5432"
          DB_NAME: todo
          DB_USER: todo
          DB_PASSWORD: testpassword
        run: pytest tests/ -v --cov=app --cov-report=xml:coverage.xml --cov-report=term-missing --cov-fail-under=80

      - name: Snyk — Python dependency scan
        run: |
          npm install -g snyk
          snyk test --severity-threshold=high --file=backend/requirements.txt
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install --legacy-peer-deps

      - name: Frontend tests
        working-directory: frontend
        run: npm test

      - name: Snyk — npm dependency scan
        working-directory: frontend
        run: npx snyk test --severity-threshold=high --file=package.json
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: SAST — ESLint security
        working-directory: frontend
        run: npm run lint

      - name: Setup tflint
        uses: terraform-linters/setup-tflint@19a52fbac37dacb22a09518e4ef6ee234f2d4987 # v4.0.0
        with:
          tflint_version: v0.54.0

      - name: tflint init
        run: tflint --init
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: tflint
        run: tflint --recursive --minimum-failure-severity=error
        working-directory: terraform

      - uses: hashicorp/setup-terraform@651471c36a6092792c552e8b1bef71e592b462d8 # v3.1.1
        with:
          terraform_version: "1.11.0"

      - name: Terraform validate
        working-directory: terraform/stack
        run: |
          terraform init -backend=false
          terraform validate

      - name: tfsec — Terraform security scan
        uses: aquasecurity/tfsec-action@b466648d6e39e7c75324f25d83891162a721f2d6 # v1.0.3
        with:
          working_directory: terraform
          soft_fail: true

      - name: Checkov — IaC security scan
        uses: bridgecrewio/checkov-action@99bb2caf247dfd9f03cf984373bc6043d4e32ebf # v12.1347.0
        with:
          directory: terraform/
          framework: terraform
          config_file: .checkov.yaml
          soft_fail: true

      - name: Trivy — Dockerfile misconfiguration scan
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          scan-type: config
          scan-ref: .
          exit-code: '1'
          severity: HIGH,CRITICAL

  # ── Stage 2: manual approval gate (configured in GitHub Environments) ───────
  # A required reviewer must approve in the GitHub Actions UI before build runs.
  approve:
    name: Await approval
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: validate
    environment: prod   # branch protection + required reviewers enforced here

    permissions:
      contents: none

    steps:
      - run: echo "Approved — proceeding to production build and deploy"

  # ── Stage 3: build + push + sign ───────────────────────────────────────────
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: approve

    permissions:
      contents: read
      id-token: write

    outputs:
      backend_image:  ${{ steps.meta.outputs.backend_image }}
      frontend_image: ${{ steps.meta.outputs.frontend_image }}

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4.0.2
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/todo-prod-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@062b18b96a7aff071d4dc91bc00c4c1a7945b076 # v2.0.1

      - name: Set image URLs
        id: meta
        run: |
          BACKEND=${{ steps.ecr-login.outputs.registry }}/todo-pipeline/backend:$IMAGE_TAG
          FRONTEND=${{ steps.ecr-login.outputs.registry }}/todo-pipeline/frontend:$IMAGE_TAG
          echo "backend_image=$BACKEND"   >> $GITHUB_OUTPUT
          echo "frontend_image=$FRONTEND" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v3.7.1

      - name: Build and push backend
        uses: docker/build-push-action@4f58ea79222b3b9dc2c8bbdd6debcef730109a75 # v6.9.0
        with:
          context: ./backend
          push: true
          # Also tag as "latest" so the current prod image is always identifiable
          tags: |
            ${{ steps.meta.outputs.backend_image }}
            ${{ steps.ecr-login.outputs.registry }}/todo-pipeline/backend:latest
          cache-from: type=gha,scope=backend-prod
          cache-to:   type=gha,mode=max,scope=backend-prod

      - name: Build and push frontend
        uses: docker/build-push-action@4f58ea79222b3b9dc2c8bbdd6debcef730109a75 # v6.9.0
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ steps.meta.outputs.frontend_image }}
            ${{ steps.ecr-login.outputs.registry }}/todo-pipeline/frontend:latest
          build-args: REACT_APP_API_URL=/api
          cache-from: type=gha,scope=frontend-prod
          cache-to:   type=gha,mode=max,scope=frontend-prod

      - name: Install Cosign
        uses: sigstore/cosign-installer@dc72c7d5c4d10cd6bcb8cf6e3fd625a9e5e537da # v3.7.0

      - name: Trivy — scan backend image
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          image-ref: ${{ steps.meta.outputs.backend_image }}
          format: table
          exit-code: '1'
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Trivy — scan frontend image
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          image-ref: ${{ steps.meta.outputs.frontend_image }}
          format: table
          exit-code: '1'
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      # Verify the signed dev/staging images (same SHA) before signing the prod tag.
      # This confirms the image wasn't tampered with between staging and prod push.
      - name: Verify upstream signatures
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign verify \
            --certificate-identity-regexp="https://github.com/${{ github.repository }}" \
            --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
            ${{ steps.meta.outputs.backend_image }} || true

      - name: Sign images
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign --yes ${{ steps.meta.outputs.backend_image }}
          cosign sign --yes ${{ steps.meta.outputs.frontend_image }}

  # ── Stage 4: Terraform + ECS deploy with rollback ──────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: build

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4.0.2
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/todo-prod-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Save current task definitions (rollback target)
        id: save-task-defs
        run: |
          BACKEND_TD=$(aws ecs describe-services \
            --cluster $CLUSTER_NAME --services $BACKEND_SERVICE \
            --query 'services[0].taskDefinition' --output text 2>/dev/null || echo "")
          FRONTEND_TD=$(aws ecs describe-services \
            --cluster $CLUSTER_NAME --services $FRONTEND_SERVICE \
            --query 'services[0].taskDefinition' --output text 2>/dev/null || echo "")
          echo "backend_td=$BACKEND_TD"   >> $GITHUB_OUTPUT
          echo "frontend_td=$FRONTEND_TD" >> $GITHUB_OUTPUT

      - uses: hashicorp/setup-terraform@651471c36a6092792c552e8b1bef71e592b462d8 # v3.1.1
        with:
          terraform_version: "1.11.0"

      - name: Install Terragrunt
        run: |
          wget -q https://github.com/gruntwork-io/terragrunt/releases/download/v0.67.16/terragrunt_linux_amd64 -O terragrunt
          chmod +x terragrunt && sudo mv terragrunt /usr/local/bin/

      - name: Terragrunt init
        working-directory: terraform/environments/prod
        run: terragrunt init --terragrunt-non-interactive

      # Bootstrap: import manually-created todo-prod-github-actions so terraform
      # apply does not fail with EntityAlreadyExists on first run.
      - name: Import bootstrap IAM role (first-run only)
        working-directory: terraform/environments/prod
        run: |
          if terragrunt state list 2>/dev/null \
              | grep -q "module.iam.aws_iam_role.github_actions"; then
            echo "✓ GitHub Actions role already in Terraform state — skipping import"
          else
            echo "Importing todo-prod-github-actions into Terraform state..."
            terragrunt import \
              -var="aws_account_id=${{ secrets.AWS_ACCOUNT_ID }}" \
              -var="backend_image_tag=$IMAGE_TAG" \
              -var="frontend_image_tag=$IMAGE_TAG" \
              module.iam.aws_iam_role.github_actions \
              todo-prod-github-actions
          fi

      - name: Terragrunt plan
        working-directory: terraform/environments/prod
        run: |
          terragrunt plan \
            -var="aws_account_id=${{ secrets.AWS_ACCOUNT_ID }}" \
            -var="backend_image_tag=$IMAGE_TAG" \
            -var="frontend_image_tag=$IMAGE_TAG" \
            -out="${GITHUB_WORKSPACE}/tfplan"

      - name: Upload plan as artifact
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: tfplan-prod-${{ github.sha }}
          path: tfplan
          retention-days: 30

      - name: Terragrunt apply
        working-directory: terraform/environments/prod
        run: terragrunt apply -auto-approve "${GITHUB_WORKSPACE}/tfplan"

      # Prod deploys backend first, waits for it to be healthy, then deploys
      # frontend — reduces the window where old frontend talks to new API.
      # Task definition ARNs are read from Terragrunt output — not from
      # describe-task-definition — to guarantee we get the exact revision
      # Terraform just registered (avoids inactive-revision errors).
      - name: Deploy backend via CodeDeploy
        id: codedeploy_backend
        working-directory: terraform/environments/prod
        run: |
          BACKEND_TD=$(terragrunt output -raw backend_task_definition_arn)
          # Build the AppSpec JSON with jq — avoids embedded Python that
          # triggers YAML parser errors on nested quotes/colons.
          APPSPEC=$(jq -cn --arg td "$BACKEND_TD" \
            '{version:1,Resources:[{TargetService:{Type:"AWS::ECS::Service",Properties:{TaskDefinition:$td,LoadBalancerInfo:{ContainerName:"backend",ContainerPort:5000}}}}]}')
          REVISION=$(jq -cn --arg content "$APPSPEC" \
            '{revisionType:"AppSpecContent",appSpecContent:{content:$content}}')
          DEPLOY_ID=$(aws deploy create-deployment \
            --application-name "$BACKEND_SERVICE" \
            --deployment-group-name "${BACKEND_SERVICE}-dg" \
            --revision "$REVISION" \
            --query deploymentId --output text)
          echo "backend_deploy_id=$DEPLOY_ID" >> $GITHUB_OUTPUT

      - name: Wait for backend CodeDeploy
        run: |
          aws deploy wait deployment-successful \
            --deployment-id ${{ steps.codedeploy_backend.outputs.backend_deploy_id }}

      - name: Deploy frontend via CodeDeploy
        id: codedeploy_frontend
        working-directory: terraform/environments/prod
        run: |
          FRONTEND_TD=$(terragrunt output -raw frontend_task_definition_arn)
          APPSPEC=$(jq -cn --arg td "$FRONTEND_TD" \
            '{version:1,Resources:[{TargetService:{Type:"AWS::ECS::Service",Properties:{TaskDefinition:$td,LoadBalancerInfo:{ContainerName:"frontend",ContainerPort:80}}}}]}')
          REVISION=$(jq -cn --arg content "$APPSPEC" \
            '{revisionType:"AppSpecContent",appSpecContent:{content:$content}}')
          DEPLOY_ID=$(aws deploy create-deployment \
            --application-name "$FRONTEND_SERVICE" \
            --deployment-group-name "${FRONTEND_SERVICE}-dg" \
            --revision "$REVISION" \
            --query deploymentId --output text)
          echo "frontend_deploy_id=$DEPLOY_ID" >> $GITHUB_OUTPUT

      - name: Wait for frontend CodeDeploy
        run: |
          aws deploy wait deployment-successful \
            --deployment-id ${{ steps.codedeploy_frontend.outputs.frontend_deploy_id }}

      - name: Production smoke tests
        run: |
          ALB_DNS=$(aws elbv2 describe-load-balancers \
            --names todo-prod --query 'LoadBalancers[0].DNSName' --output text)

          curl --fail --retry 5 --retry-delay 15 http://$ALB_DNS/api/health

          TOKEN=$(curl -sf -X POST http://$ALB_DNS/api/auth/signup \
            -H 'Content-Type: application/json' \
            -d "{\"username\":\"smoke_$(date +%s)\",\"email\":\"smoke_$(date +%s)@prod.com\",\"password\":\"smokepass\"}" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['token'])")

          curl --fail -X POST http://$ALB_DNS/api/todos \
            -H "Authorization: Bearer $TOKEN" \
            -H 'Content-Type: application/json' \
            -d '{"title":"prod smoke test"}'

      - name: Rollback on failure
        if: failure() && steps.save-task-defs.outputs.backend_td != ''
        run: |
          echo "PRODUCTION ROLLBACK TRIGGERED"
          # Stop any in-progress CodeDeploy deployments (triggers built-in rollback)
          aws deploy stop-deployment \
            --deployment-id ${{ steps.codedeploy_backend.outputs.backend_deploy_id }} \
            --auto-rollback-enabled 2>/dev/null || true
          aws deploy stop-deployment \
            --deployment-id ${{ steps.codedeploy_frontend.outputs.frontend_deploy_id }} \
            --auto-rollback-enabled 2>/dev/null || true
          # If deployments already completed, redeploy previous task definitions
          _codedeploy_rollback() {
            local td="$1" app="$2" group="$3" container="$4" port="$5"
            local appspec revision
            appspec=$(jq -cn --arg td "$td" --arg c "$container" --argjson p "$port" \
              '{version:1,Resources:[{TargetService:{Type:"AWS::ECS::Service",Properties:{TaskDefinition:$td,LoadBalancerInfo:{ContainerName:$c,ContainerPort:$p}}}}]}')
            revision=$(jq -cn --arg content "$appspec" \
              '{revisionType:"AppSpecContent",appSpecContent:{content:$content}}')
            aws deploy create-deployment \
              --application-name "$app" --deployment-group-name "$group" \
              --revision "$revision" || true
          }
          _codedeploy_rollback \
            "${{ steps.save-task-defs.outputs.backend_td }}" \
            "$BACKEND_SERVICE" "${BACKEND_SERVICE}-dg" "backend" 5000
          _codedeploy_rollback \
            "${{ steps.save-task-defs.outputs.frontend_td }}" \
            "$FRONTEND_SERVICE" "${FRONTEND_SERVICE}-dg" "frontend" 80

      - name: Log deployment result
        if: always()
        run: |
          aws logs put-log-events \
            --log-group-name /ecs/todo-prod/pipeline \
            --log-stream-name deployments \
            --log-events "[{\"timestamp\":$(date +%s%3N),\"message\":\"Deploy $IMAGE_TAG: ${{ job.status }}\"}]" \
            2>/dev/null || true

  # ── Stage 5: Email notification via AWS SES (always runs) ───────────────────
  notify:
    name: Notify
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [validate, approve, build, deploy]
    if: always()

    permissions:
      id-token: write
      contents: none

    steps:
      - uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4.0.2
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/todo-prod-github-actions
          aws-region: us-east-1

      - name: Send email notification
        run: |
          STATUS="${{ needs.deploy.result }}"
          if [ "$STATUS" = "success" ]; then
            SUBJECT="✅ [PRODUCTION] Deploy succeeded — ${{ env.IMAGE_TAG }}"
            BODY="The production deployment completed successfully.\n\nCommit: ${{ github.sha }}\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          else
            SUBJECT="🚨 [PRODUCTION] Deploy FAILED — ${{ env.IMAGE_TAG }}"
            BODY="The PRODUCTION deployment failed — check immediately.\n\nStages: validate=${{ needs.validate.result }}, build=${{ needs.build.result }}, deploy=${{ needs.deploy.result }}\n\nCommit: ${{ github.sha }}\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi
          aws ses send-email \
            --from "${{ secrets.NOTIFY_FROM_EMAIL }}" \
            --to "${{ secrets.NOTIFY_TO_EMAIL }}" \
            --subject "$SUBJECT" \
            --text "$BODY" \
            --region us-east-1
