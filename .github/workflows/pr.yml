name: PR Validation

on:
  pull_request:
    branches: [dev, staging, main]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write  # needed to upload SARIF results to GitHub Security tab

jobs:

  # ── Backend: tests + Snyk + SonarQube ──────────────────────────────────────
  backend:
    name: Backend — test / Snyk / SonarQube
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # SonarQube needs full history to calculate blame and coverage trends
          fetch-depth: 0

      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests with coverage
        run: |
          pytest tests/ -v \
            --cov=app \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=80

      - name: Snyk — Python dependency scan
        run: |
          npm install -g snyk
          snyk test --severity-threshold=high --file=requirements.txt
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      # ESLint security plugin still covers JS-adjacent patterns in any .py files
      # SonarQube handles the full SAST analysis below.
      - name: SonarQube scan
        uses: SonarSource/sonarqube-scan-action@2500896589ef8f7247069a56136f8dc177c27ccf # v5.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=todo-pipeline-backend
            -Dsonar.sources=backend
            -Dsonar.python.coverage.reportPaths=backend/coverage.xml
            -Dsonar.qualitygate.wait=true

  # ── Frontend: tests + Snyk + ESLint ────────────────────────────────────────
  frontend:
    name: Frontend — test / Snyk / ESLint
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      # Snyk for npm: detects vulns in transitive deps that npm audit misses,
      # and can open automatic fix PRs via the Snyk dashboard.
      - name: Snyk — npm dependency scan
        run: npx snyk test --severity-threshold=high --file=package.json
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      # ESLint with security plugin (catches eval, injection patterns, etc.)
      - name: SAST — ESLint security
        run: npm run lint

      - name: SonarQube scan
        uses: SonarSource/sonarqube-scan-action@2500896589ef8f7247069a56136f8dc177c27ccf # v5.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=todo-pipeline-frontend
            -Dsonar.sources=frontend/src
            -Dsonar.qualitygate.wait=true

  # ── IaC: tflint + Terraform validate + tfsec + Checkov ────────────────────
  iac:
    name: IaC — tflint / validate / tfsec / Checkov
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # tflint catches deprecated resources, invalid attribute values, and naming
      # convention violations before Terraform even runs.
      - name: Setup tflint
        uses: terraform-linters/setup-tflint@v4.0.0
        with:
          tflint_version: v0.54.0

      - name: tflint init
        run: tflint --init
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: tflint
        run: tflint --recursive --minimum-failure-severity=error
        working-directory: terraform

      - uses: hashicorp/setup-terraform@651471c36a6092792c552e8b1bef71e592b462d8 # v3.1.1
        with:
          terraform_version: "1.8.0"

      - name: Terraform validate
        working-directory: terraform/stack
        run: |
          terraform init -backend=false
          terraform validate

      - name: tfsec — Terraform security scan
        uses: aquasecurity/tfsec-action@b466648d6e39e7c75324f25d83891162a721f2d6 # v1.0.3
        with:
          working_directory: terraform
          soft_fail: true
          format: sarif
          additional_args: --out tfsec.sarif

      - name: Upload tfsec SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@dd746615b3dff6e73b57f290f0b90f48c4cd69ad # v3.28.5
        if: always()
        with:
          sarif_file: tfsec.sarif
          category: tfsec

      # Checkov is the hard gate on PRs — soft_fail is intentionally absent.
      # Accepted-risk suppressions are documented in .checkov.yaml.
      - name: Checkov — IaC security scan
        uses: bridgecrewio/checkov-action@e9cd879593ec52aa7c88bfa9cde0dce5c3c34e37 # v12.2890.0
        with:
          directory: terraform/
          framework: terraform
          config_file: .checkov.yaml
          output_format: sarif
          output_file_path: checkov.sarif

      - name: Upload Checkov SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@dd746615b3dff6e73b57f290f0b90f48c4cd69ad # v3.28.5
        if: always()
        with:
          sarif_file: checkov.sarif
          category: checkov

      - name: Upload scan artifacts
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        if: always()
        with:
          name: iac-scan-results
          path: |
            tfsec.sarif
            checkov.sarif
          retention-days: 14
