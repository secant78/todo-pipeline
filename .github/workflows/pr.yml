name: PR Validation

# Runs on every pull request targeting any of the three environment branches.
# A PR must pass all jobs here before it can be merged (enforce via branch
# protection rules: Settings → Branches → Require status checks to pass).
on:
  pull_request:
    branches: [dev, staging, main]

# Cancel any in-progress run for the same PR when a new commit is pushed,
# so stale runs don't consume minutes or produce confusing results.
concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

# Minimal permissions — this workflow never deploys, so it needs nothing beyond
# reading the repo and, for SAST, writing security events for the GitHub UI.
permissions:
  contents: read
  security-events: write

jobs:

  # ── Backend: tests + audit + SAST ──────────────────────────────────────────
  backend:
    name: Backend — test / audit / SAST
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests with coverage
        run: |
          pytest tests/ -v \
            --cov=app \
            --cov-report=term-missing \
            --cov-fail-under=80

      # Fails the job if any known CVE is found in the installed packages
      - name: Dependency vulnerability audit
        run: pip-audit --requirement requirements.txt --strict

      # Bandit flags common Python security anti-patterns (hardcoded passwords,
      # use of shell=True, SQL injection patterns, etc.)
      - name: SAST — Bandit
        run: |
          bandit -r app.py \
            --format json \
            --output bandit-report.json \
            --severity-level medium || true
          bandit -r app.py --severity-level medium

      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: bandit-report
          path: backend/bandit-report.json
          retention-days: 14

  # ── Frontend: tests + audit + lint ─────────────────────────────────────────
  frontend:
    name: Frontend — test / audit / lint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      # Fails on HIGH or CRITICAL CVEs in production dependencies only
      - name: Dependency vulnerability audit
        run: npm audit --audit-level=high --omit=dev

      # ESLint with the security plugin (configured in .eslintrc.json)
      - name: SAST — ESLint security
        run: npm run lint

  # ── IaC: Terraform validate + Checkov ──────────────────────────────────────
  iac:
    name: IaC — validate / security scan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: hashicorp/setup-terraform@651471c36a6092792c552e8b1bef71e592b462d8 # v3.1.1
        with:
          terraform_version: "1.8.0"

      # terraform validate checks syntax and internal references without
      # needing AWS credentials or real state
      - name: Terraform validate
        working-directory: terraform
        run: |
          terraform init -backend=false
          terraform validate

      # Checkov scans for misconfigurations: open security groups, missing
      # encryption, overly permissive IAM, unversioned S3 buckets, etc.
      - name: IaC security scan — Checkov
        run: |
          pip install checkov --quiet
          checkov \
            --directory terraform/ \
            --framework terraform \
            --compact \
            --quiet \
            --soft-fail
