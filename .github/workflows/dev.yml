name: Deploy — Development

on:
  push:
    branches: [dev]

# Only one dev deployment runs at a time.  A new push cancels the in-progress one.
concurrency:
  group: deploy-dev
  cancel-in-progress: true

env:
  AWS_REGION:       us-east-1
  TF_WORKSPACE:     dev
  IMAGE_TAG:        dev-${{ github.sha }}
  CLUSTER_NAME:     todo-dev
  BACKEND_SERVICE:  todo-dev-backend
  FRONTEND_SERVICE: todo-dev-frontend

jobs:

  # ── Stage 1: tests, audits, SAST, IaC scan ─────────────────────────────────
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Permissions are scoped to the job that needs them, not the whole workflow.
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install backend dev dependencies
        run: pip install -r backend/requirements-dev.txt

      - name: Backend tests
        working-directory: backend
        run: pytest tests/ -v --cov=app --cov-report=term-missing --cov-fail-under=80

      - name: Backend dependency audit
        run: pip-audit --requirement backend/requirements.txt --strict

      - name: SAST — Bandit
        working-directory: backend
        run: bandit -r app.py --severity-level medium

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Frontend tests
        working-directory: frontend
        run: npm test

      - name: Frontend dependency audit
        working-directory: frontend
        run: npm audit --audit-level=high --omit=dev

      - name: SAST — ESLint security
        working-directory: frontend
        run: npm run lint

      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: "1.8.0"

      - name: Terraform validate
        working-directory: terraform
        run: |
          terraform init -backend=false
          terraform validate

      - name: IaC security scan — Checkov
        run: |
          pip install checkov --quiet
          checkov --directory terraform/ --framework terraform --compact --quiet --soft-fail

  # ── Stage 2: build images with layer caching, sign with Cosign ─────────────
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: validate

    permissions:
      contents: read
      id-token: write   # OIDC for AWS + Cosign keyless signing

    outputs:
      backend_image:  ${{ steps.meta.outputs.backend_image }}
      frontend_image: ${{ steps.meta.outputs.frontend_image }}

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4.0.2
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/todo-dev-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@062b18b96a7aff071d4dc91bc00c4c1a7945b076 # v2.0.1

      - name: Set image URLs
        id: meta
        run: |
          BACKEND=${{ steps.ecr-login.outputs.registry }}/todo-pipeline/backend:$IMAGE_TAG
          FRONTEND=${{ steps.ecr-login.outputs.registry }}/todo-pipeline/frontend:$IMAGE_TAG
          echo "backend_image=$BACKEND"   >> $GITHUB_OUTPUT
          echo "frontend_image=$FRONTEND" >> $GITHUB_OUTPUT

      # Buildx enables the GHA layer cache, which dramatically cuts build times
      # on subsequent runs by reusing unchanged layers.
      - uses: docker/setup-buildx-action@988b5a0280414f521da01fcc63a27aeeb4b104db # v3.7.1

      - name: Build and push backend
        uses: docker/build-push-action@4f58ea79222b3b9dc2c8bbdd6debcef730109a75 # v6.9.0
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.backend_image }}
          cache-from: type=gha,scope=backend-dev
          cache-to:   type=gha,mode=max,scope=backend-dev

      - name: Build and push frontend
        uses: docker/build-push-action@4f58ea79222b3b9dc2c8bbdd6debcef730109a75 # v6.9.0
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta.outputs.frontend_image }}
          build-args: REACT_APP_API_URL=/api
          cache-from: type=gha,scope=frontend-dev
          cache-to:   type=gha,mode=max,scope=frontend-dev

      # Cosign keyless signing — uses the GitHub Actions OIDC token as the
      # signing identity.  No private keys to store or rotate.
      # The signature is recorded in the Rekor transparency log.
      - name: Install Cosign
        uses: sigstore/cosign-installer@dc72c7d5c4d10cd6bcb8cf6e3fd625a9e5e537da # v3.7.0

      - name: Sign images
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign --yes ${{ steps.meta.outputs.backend_image }}
          cosign sign --yes ${{ steps.meta.outputs.frontend_image }}

  # ── Stage 3: Terraform + ECS deploy with rollback ──────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4.0.2
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/todo-dev-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Save current task definitions (rollback target)
        id: save-task-defs
        run: |
          BACKEND_TD=$(aws ecs describe-services \
            --cluster $CLUSTER_NAME --services $BACKEND_SERVICE \
            --query 'services[0].taskDefinition' --output text 2>/dev/null || echo "")
          FRONTEND_TD=$(aws ecs describe-services \
            --cluster $CLUSTER_NAME --services $FRONTEND_SERVICE \
            --query 'services[0].taskDefinition' --output text 2>/dev/null || echo "")
          echo "backend_td=$BACKEND_TD"   >> $GITHUB_OUTPUT
          echo "frontend_td=$FRONTEND_TD" >> $GITHUB_OUTPUT

      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: "1.8.0"

      - name: Terraform init
        working-directory: terraform
        run: terraform init

      - name: Select dev workspace
        working-directory: terraform
        run: terraform workspace select dev || terraform workspace new dev

      - name: Terraform plan
        working-directory: terraform
        run: |
          terraform plan \
            -var="aws_account_id=${{ secrets.AWS_ACCOUNT_ID }}" \
            -var="backend_image_tag=$IMAGE_TAG" \
            -var="frontend_image_tag=$IMAGE_TAG" \
            -out=tfplan

      - name: Upload plan as artifact
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: tfplan-dev-${{ github.sha }}
          path: terraform/tfplan
          retention-days: 7

      - name: Terraform apply
        working-directory: terraform
        run: terraform apply -auto-approve tfplan

      - name: Deploy to ECS
        run: |
          aws ecs update-service --cluster $CLUSTER_NAME --service $BACKEND_SERVICE  --force-new-deployment
          aws ecs update-service --cluster $CLUSTER_NAME --service $FRONTEND_SERVICE --force-new-deployment

      - name: Wait for stable deployment
        run: |
          aws ecs wait services-stable --cluster $CLUSTER_NAME --services $BACKEND_SERVICE
          aws ecs wait services-stable --cluster $CLUSTER_NAME --services $FRONTEND_SERVICE

      - name: Health check
        run: |
          ALB_DNS=$(aws elbv2 describe-load-balancers \
            --names todo-dev --query 'LoadBalancers[0].DNSName' --output text)
          curl --fail --retry 5 --retry-delay 10 http://$ALB_DNS/api/health

      - name: Rollback on failure
        if: failure() && steps.save-task-defs.outputs.backend_td != ''
        run: |
          aws ecs update-service --cluster $CLUSTER_NAME --service $BACKEND_SERVICE \
            --task-definition ${{ steps.save-task-defs.outputs.backend_td }} --force-new-deployment
          aws ecs update-service --cluster $CLUSTER_NAME --service $FRONTEND_SERVICE \
            --task-definition ${{ steps.save-task-defs.outputs.frontend_td }} --force-new-deployment

      - name: Log deployment result
        if: always()
        run: |
          aws logs put-log-events \
            --log-group-name /ecs/todo-dev/pipeline \
            --log-stream-name deployments \
            --log-events "[{\"timestamp\":$(date +%s%3N),\"message\":\"Deploy $IMAGE_TAG: ${{ job.status }}\"}]" \
            2>/dev/null || true

  # ── Stage 4: Slack notification (always runs) ───────────────────────────────
  notify:
    name: Notify
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [validate, build, deploy]
    if: always()

    permissions:
      contents: none

    steps:
      - name: Slack notification
        run: |
          STATUS="${{ needs.deploy.result }}"
          if [ "$STATUS" = "success" ]; then
            ICON="✅"; MSG="succeeded"
          else
            ICON="❌"; MSG="failed (stage: validate=${{ needs.validate.result }}, build=${{ needs.build.result }}, deploy=${{ needs.deploy.result }})"
          fi
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H "Content-type: application/json" \
            -d "{\"text\":\"$ICON *dev* deploy \`${{ env.IMAGE_TAG }}\` $MSG\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>\"}"
