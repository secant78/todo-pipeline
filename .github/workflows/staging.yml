name: Deploy — Staging

on:
  push:
    branches: [staging]

# Staging deploys must not be interrupted mid-flight.
concurrency:
  group: deploy-staging
  cancel-in-progress: false

env:
  AWS_REGION:       us-east-2
  ECR_REGION:       us-east-1
  TF_WORKSPACE:     staging
  IMAGE_TAG:        staging-${{ github.sha }}
  CLUSTER_NAME:     todo-staging
  BACKEND_SERVICE:  todo-staging-backend
  FRONTEND_SERVICE: todo-staging-frontend

jobs:

  # ── Stage 1: tests + security scans + Terraform validate ───────────────────
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read
      id-token: write

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: todo
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: todo
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install backend dev dependencies
        run: pip install -r backend/requirements-dev.txt

      - name: Backend tests
        working-directory: backend
        env:
          DB_HOST: localhost
          DB_PORT: "5432"
          DB_NAME: todo
          DB_USER: todo
          DB_PASSWORD: testpassword
        run: pytest tests/ -v --cov=app --cov-report=term-missing --cov-fail-under=80

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install --legacy-peer-deps

      - name: Frontend tests
        working-directory: frontend
        run: npm test

      - uses: hashicorp/setup-terraform@651471c36a6092792c552e8b1bef71e592b462d8 # v3.1.1
        with:
          terraform_version: "1.11.0"

      - name: Terraform validate
        working-directory: terraform/stack
        run: |
          terraform init -backend=false
          terraform validate

      # Staging requires passing security scans before images are built.
      - name: Snyk — Python dependency scan
        run: npx snyk test --severity-threshold=high --file=backend/requirements.txt
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true   # advisory — escalate to blocking when Snyk is wired up

      - name: Snyk — npm dependency scan
        working-directory: frontend
        run: npx snyk test --severity-threshold=high --file=package.json
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true

  # ── Stage 2: build + CVE scan + sign ───────────────────────────────────────
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: validate

    permissions:
      contents: read
      id-token: write

    outputs:
      backend_image:  ${{ steps.meta.outputs.backend_image }}
      frontend_image: ${{ steps.meta.outputs.frontend_image }}

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4.0.2
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/todo-staging-github-actions
          aws-region: ${{ env.ECR_REGION }}

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@062b18b96a7aff071d4dc91bc00c4c1a7945b076 # v2.0.1

      - name: Set image URLs
        id: meta
        run: |
          BACKEND=${{ steps.ecr-login.outputs.registry }}/todo-pipeline/backend:$IMAGE_TAG
          FRONTEND=${{ steps.ecr-login.outputs.registry }}/todo-pipeline/frontend:$IMAGE_TAG
          echo "backend_image=$BACKEND"   >> $GITHUB_OUTPUT
          echo "frontend_image=$FRONTEND" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@988b5a0280414f521da01fcc63a27aeeb4b104db # v3.7.1

      - name: Build and push backend
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.backend_image }}
          cache-from: type=gha,scope=backend-staging
          cache-to:   type=gha,mode=max,scope=backend-staging

      - name: Build and push frontend
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta.outputs.frontend_image }}
          build-args: REACT_APP_API_URL=/api
          cache-from: type=gha,scope=frontend-staging
          cache-to:   type=gha,mode=max,scope=frontend-staging

      # Scan the pushed images for HIGH/CRITICAL CVEs before deploying.
      - name: Trivy — scan backend image
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          image-ref: ${{ steps.meta.outputs.backend_image }}
          format: table
          exit-code: '0'          # advisory until baseline is clean; set to '1' to block
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Trivy — scan frontend image
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          image-ref: ${{ steps.meta.outputs.frontend_image }}
          format: table
          exit-code: '0'
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Install Cosign
        uses: sigstore/cosign-installer@dc72c7d5c4d10cd6bcb8cf6e3fd625a9e5e537da # v3.7.0

      - name: Sign images
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign --yes ${{ steps.meta.outputs.backend_image }}
          cosign sign --yes ${{ steps.meta.outputs.frontend_image }}

  # ── Stage 3: Terraform + ECS rolling deploy with rollback ──────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4.0.2
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/todo-staging-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Save current task definitions (rollback target)
        id: save-task-defs
        run: |
          BACKEND_TD=$(aws ecs describe-services \
            --cluster $CLUSTER_NAME --services $BACKEND_SERVICE \
            --query 'services[0].taskDefinition' --output text 2>/dev/null || echo "")
          FRONTEND_TD=$(aws ecs describe-services \
            --cluster $CLUSTER_NAME --services $FRONTEND_SERVICE \
            --query 'services[0].taskDefinition' --output text 2>/dev/null || echo "")
          echo "backend_td=$BACKEND_TD"   >> $GITHUB_OUTPUT
          echo "frontend_td=$FRONTEND_TD" >> $GITHUB_OUTPUT

      - uses: hashicorp/setup-terraform@651471c36a6092792c552e8b1bef71e592b462d8 # v3.1.1
        with:
          terraform_version: "1.11.0"

      - name: Terraform init
        working-directory: terraform/stack
        run: |
          unset TF_WORKSPACE
          terraform init -upgrade -reconfigure
          terraform workspace select staging 2>/dev/null || terraform workspace new staging

      # Bootstrap: import the manually-created todo-staging-github-actions role so
      # Terraform does not try to create it (which would fail with AlreadyExists).
      # Uses state list to detect whether the resource is already managed — if it
      # is, the import is skipped entirely. If not, import runs and any real failure
      # surfaces as a non-zero exit code (no error-swallowing pipes).
      - name: Import bootstrap IAM role (first-run only)
        working-directory: terraform/stack
        run: |
          if terraform state list 2>/dev/null \
              | grep -q "module.iam.aws_iam_role.github_actions"; then
            echo "✓ GitHub Actions role already in Terraform state — skipping import"
          else
            echo "Importing todo-staging-github-actions into Terraform state..."
            terraform import \
              -var-file="../environments/staging/staging.tfvars" \
              -var="aws_account_id=${{ secrets.AWS_ACCOUNT_ID }}" \
              -var="backend_image_tag=$IMAGE_TAG" \
              -var="frontend_image_tag=$IMAGE_TAG" \
              module.iam.aws_iam_role.github_actions \
              todo-staging-github-actions
          fi

      - name: Terraform plan
        working-directory: terraform/stack
        run: |
          terraform plan \
            -var-file="../environments/staging/staging.tfvars" \
            -var="aws_account_id=${{ secrets.AWS_ACCOUNT_ID }}" \
            -var="backend_image_tag=$IMAGE_TAG" \
            -var="frontend_image_tag=$IMAGE_TAG" \
            -out=tfplan

      - name: Upload plan as artifact
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: tfplan-staging-${{ github.sha }}
          path: terraform/stack/tfplan
          retention-days: 7

      - name: Terraform apply
        working-directory: terraform/stack
        run: terraform apply -auto-approve tfplan

      - name: Deploy to ECS (rolling update)
        working-directory: terraform/stack
        run: |
          BACKEND_TD=$(terraform output -raw backend_task_definition_arn)
          FRONTEND_TD=$(terraform output -raw frontend_task_definition_arn)

          aws ecs update-service --cluster $CLUSTER_NAME --service $BACKEND_SERVICE \
            --task-definition "$BACKEND_TD" --force-new-deployment
          aws ecs update-service --cluster $CLUSTER_NAME --service $FRONTEND_SERVICE \
            --task-definition "$FRONTEND_TD" --force-new-deployment

          aws ecs wait services-stable \
            --cluster $CLUSTER_NAME --services $BACKEND_SERVICE $FRONTEND_SERVICE

      - name: Health check + smoke tests
        run: |
          ALB_DNS=$(aws elbv2 describe-load-balancers \
            --names todo-staging --query 'LoadBalancers[0].DNSName' --output text)

          BACKEND_TG=$(aws elbv2 describe-target-groups \
            --names todo-staging-backend \
            --query 'TargetGroups[0].TargetGroupArn' --output text)

          echo "Waiting for at least one healthy backend target..."
          for i in $(seq 1 24); do
            aws elbv2 describe-target-health \
              --target-group-arn "$BACKEND_TG" \
              --query 'TargetHealthDescriptions[*].{IP:Target.Id,State:TargetHealth.State,Reason:TargetHealth.Reason}' \
              --output table 2>/dev/null || true

            HEALTHY=$(aws elbv2 describe-target-health \
              --target-group-arn "$BACKEND_TG" \
              --query 'length(TargetHealthDescriptions[?TargetHealth.State==`healthy`])' \
              --output text)
            if [ "${HEALTHY:-0}" -gt 0 ]; then
              echo "  ✓ $HEALTHY healthy target(s) after attempt $i"
              break
            fi
            echo "  attempt $i/24 — no healthy targets yet, retrying in 10 s..."
            sleep 10
          done

          # Liveness
          curl --fail --retry 3 --retry-delay 5 http://$ALB_DNS/api/health

          # Smoke: sign up a transient user, create a todo, verify it appears
          TS=$(date +%s)
          TOKEN=$(curl -sf -X POST http://$ALB_DNS/api/auth/signup \
            -H 'Content-Type: application/json' \
            -d "{\"username\":\"smoke_$TS\",\"email\":\"smoke_$TS@test.invalid\",\"password\":\"Sm0ke!pass\"}" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['token'])")
          echo "  ✓ signup OK"

          curl --fail -X POST http://$ALB_DNS/api/todos \
            -H "Authorization: Bearer $TOKEN" \
            -H 'Content-Type: application/json' \
            -d '{"title":"staging smoke test"}'
          echo "  ✓ create todo OK"

          COUNT=$(curl -sf http://$ALB_DNS/api/todos \
            -H "Authorization: Bearer $TOKEN" \
            | python3 -c "import sys,json; print(len(json.load(sys.stdin)))")
          [ "$COUNT" -ge 1 ] && echo "  ✓ list todos OK ($COUNT item(s))"

      - name: Dump diagnostics on failure
        if: failure()
        run: |
          echo "========================================================"
          echo "=== ECS service summary ==="
          aws ecs describe-services \
            --cluster $CLUSTER_NAME --services $BACKEND_SERVICE \
            --query 'services[0].{Running:runningCount,Desired:desiredCount,Pending:pendingCount,Status:status}' \
            --output table || true

          echo "=== ECS service load balancer registration ==="
          aws ecs describe-services \
            --cluster $CLUSTER_NAME --services $BACKEND_SERVICE \
            --query 'services[0].loadBalancers' --output json || true

          echo "=== ECS service events (last 10) ==="
          aws ecs describe-services \
            --cluster $CLUSTER_NAME --services $BACKEND_SERVICE \
            --query 'services[0].events[:10].[message]' --output text || true

          echo "=== Most recent STOPPED task ==="
          STOPPED=$(aws ecs list-tasks \
            --cluster $CLUSTER_NAME --service-name $BACKEND_SERVICE \
            --desired-status STOPPED --query 'taskArns[0]' --output text 2>/dev/null || true)
          if [ -n "$STOPPED" ] && [ "$STOPPED" != "None" ]; then
            aws ecs describe-tasks \
              --cluster $CLUSTER_NAME --tasks "$STOPPED" \
              --query 'tasks[0].{StopCode:stopCode,StopReason:stoppedReason,Containers:containers[*].{Name:name,Reason:reason,ExitCode:exitCode}}' \
              --output json || true
          fi

          echo "=== Backend CloudWatch logs (last 10 min) ==="
          aws logs tail /ecs/todo-staging/backend \
            --since 10m --region $AWS_REGION || echo "  (no log events — container never started)"
          echo "========================================================"

      - name: Rollback on failure
        if: failure() && steps.save-task-defs.outputs.backend_td != ''
        run: |
          aws ecs update-service --cluster $CLUSTER_NAME --service $BACKEND_SERVICE \
            --task-definition "${{ steps.save-task-defs.outputs.backend_td }}" --force-new-deployment
          aws ecs update-service --cluster $CLUSTER_NAME --service $FRONTEND_SERVICE \
            --task-definition "${{ steps.save-task-defs.outputs.frontend_td }}" --force-new-deployment

      - name: Log deployment result
        if: always()
        run: |
          aws logs put-log-events \
            --log-group-name /ecs/todo-staging/pipeline \
            --log-stream-name deployments \
            --log-events '[{"timestamp":'$(date +%s%3N)',"message":"Deploy '"$IMAGE_TAG"': ${{ job.status }}"}]' \
            2>/dev/null || true

  # ── Stage 4: Email notification (always runs) ───────────────────────────────
  notify:
    name: Notify
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [validate, build, deploy]
    if: always()

    permissions:
      id-token: write
      contents: none

    steps:
      - uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4.0.2
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/todo-staging-github-actions
          aws-region: us-east-1

      - name: Send email notification
        run: |
          STATUS="${{ needs.deploy.result }}"
          if [ "$STATUS" = "success" ]; then
            SUBJECT="✅ [staging] Deploy succeeded — ${{ env.IMAGE_TAG }}"
            BODY="The staging deployment completed successfully.\n\nCommit: ${{ github.sha }}\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          else
            SUBJECT="❌ [staging] Deploy FAILED — ${{ env.IMAGE_TAG }}"
            BODY="The staging deployment failed.\n\nStages: validate=${{ needs.validate.result }}, build=${{ needs.build.result }}, deploy=${{ needs.deploy.result }}\n\nCommit: ${{ github.sha }}\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi
          aws ses send-email \
            --from "${{ secrets.NOTIFY_FROM_EMAIL }}" \
            --to "${{ secrets.NOTIFY_TO_EMAIL }}" \
            --subject "$SUBJECT" \
            --text "$BODY" \
            --region us-east-1
