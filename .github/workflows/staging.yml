name: Deploy — Staging

on:
  push:
    branches: [staging]

concurrency:
  group: deploy-staging
  cancel-in-progress: true

env:
  AWS_REGION:       us-east-1
  TF_WORKSPACE:     staging
  IMAGE_TAG:        staging-${{ github.sha }}
  CLUSTER_NAME:     todo-staging
  BACKEND_SERVICE:  todo-staging-backend
  FRONTEND_SERVICE: todo-staging-frontend

jobs:

  # ── Stage 1: tests, audits, SAST, IaC scan ─────────────────────────────────
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install backend dev dependencies
        run: pip install -r backend/requirements-dev.txt

      - name: Backend tests
        working-directory: backend
        run: pytest tests/ -v --cov=app --cov-report=xml:coverage.xml --cov-report=term-missing --cov-fail-under=80

      - name: Snyk — Python dependency scan
        run: |
          npm install -g snyk
          snyk test --severity-threshold=high --file=backend/requirements.txt
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Frontend tests
        working-directory: frontend
        run: npm test

      - name: Snyk — npm dependency scan
        working-directory: frontend
        run: npx snyk test --severity-threshold=high --file=package.json
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: SAST — ESLint security
        working-directory: frontend
        run: npm run lint

      - name: Setup tflint
        uses: terraform-linters/setup-tflint@v4.0.0
        with:
          tflint_version: v0.54.0

      - name: tflint init
        run: tflint --init
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: tflint
        run: tflint --recursive --minimum-failure-severity=error
        working-directory: terraform

      - uses: hashicorp/setup-terraform@651471c36a6092792c552e8b1bef71e592b462d8 # v3.1.1
        with:
          terraform_version: "1.8.0"

      - name: Terraform validate
        working-directory: terraform/stack
        run: |
          terraform init -backend=false
          terraform validate

      - name: tfsec — Terraform security scan
        uses: aquasecurity/tfsec-action@b466648d6e39e7c75324f25d83891162a721f2d6 # v1.0.3
        with:
          working_directory: terraform
          soft_fail: true

      - name: Checkov — IaC security scan
        uses: bridgecrewio/checkov-action@e9cd879593ec52aa7c88bfa9cde0dce5c3c34e37 # v12.2890.0
        with:
          directory: terraform/
          framework: terraform
          config_file: .checkov.yaml
          soft_fail: true

      - name: Trivy — Dockerfile misconfiguration scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: config
          scan-ref: .
          exit-code: '1'
          severity: HIGH,CRITICAL

  # ── Stage 2: build + push + sign ───────────────────────────────────────────
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: validate

    permissions:
      contents: read
      id-token: write

    outputs:
      backend_image:  ${{ steps.meta.outputs.backend_image }}
      frontend_image: ${{ steps.meta.outputs.frontend_image }}

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4.0.2
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/todo-staging-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@062b18b96a7aff071d4dc91bc00c4c1a7945b076 # v2.0.1

      - name: Set image URLs
        id: meta
        run: |
          BACKEND=${{ steps.ecr-login.outputs.registry }}/todo-pipeline/backend:$IMAGE_TAG
          FRONTEND=${{ steps.ecr-login.outputs.registry }}/todo-pipeline/frontend:$IMAGE_TAG
          echo "backend_image=$BACKEND"   >> $GITHUB_OUTPUT
          echo "frontend_image=$FRONTEND" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@988b5a0280414f521da01fcc63a27aeeb4b104db # v3.7.1

      - name: Build and push backend
        uses: docker/build-push-action@4f58ea79222b3b9dc2c8bbdd6debcef730109a75 # v6.9.0
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.backend_image }}
          cache-from: type=gha,scope=backend-staging
          cache-to:   type=gha,mode=max,scope=backend-staging

      - name: Build and push frontend
        uses: docker/build-push-action@4f58ea79222b3b9dc2c8bbdd6debcef730109a75 # v6.9.0
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta.outputs.frontend_image }}
          build-args: REACT_APP_API_URL=/api
          cache-from: type=gha,scope=frontend-staging
          cache-to:   type=gha,mode=max,scope=frontend-staging

      - name: Trivy — scan backend image
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ steps.meta.outputs.backend_image }}
          format: table
          exit-code: '1'
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Trivy — scan frontend image
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ steps.meta.outputs.frontend_image }}
          format: table
          exit-code: '1'
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Install Cosign
        uses: sigstore/cosign-installer@dc72c7d5c4d10cd6bcb8cf6e3fd625a9e5e537da # v3.7.0

      - name: Sign images
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign --yes ${{ steps.meta.outputs.backend_image }}
          cosign sign --yes ${{ steps.meta.outputs.frontend_image }}

  # ── Stage 3: Terraform + ECS deploy with rollback ──────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4.0.2
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/todo-staging-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Save current task definitions (rollback target)
        id: save-task-defs
        run: |
          BACKEND_TD=$(aws ecs describe-services \
            --cluster $CLUSTER_NAME --services $BACKEND_SERVICE \
            --query 'services[0].taskDefinition' --output text 2>/dev/null || echo "")
          FRONTEND_TD=$(aws ecs describe-services \
            --cluster $CLUSTER_NAME --services $FRONTEND_SERVICE \
            --query 'services[0].taskDefinition' --output text 2>/dev/null || echo "")
          echo "backend_td=$BACKEND_TD"   >> $GITHUB_OUTPUT
          echo "frontend_td=$FRONTEND_TD" >> $GITHUB_OUTPUT

      - uses: hashicorp/setup-terraform@651471c36a6092792c552e8b1bef71e592b462d8 # v3.1.1
        with:
          terraform_version: "1.8.0"

      - name: Install Terragrunt
        run: |
          wget -q https://github.com/gruntwork-io/terragrunt/releases/download/v0.67.16/terragrunt_linux_amd64 -O terragrunt
          chmod +x terragrunt && sudo mv terragrunt /usr/local/bin/

      - name: Terragrunt init
        working-directory: terraform/environments/staging
        run: terragrunt init --terragrunt-non-interactive

      - name: Terragrunt plan
        working-directory: terraform/environments/staging
        run: |
          terragrunt plan \
            -var="aws_account_id=${{ secrets.AWS_ACCOUNT_ID }}" \
            -var="backend_image_tag=$IMAGE_TAG" \
            -var="frontend_image_tag=$IMAGE_TAG" \
            -out="${GITHUB_WORKSPACE}/tfplan"

      - name: Upload plan as artifact
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: tfplan-staging-${{ github.sha }}
          path: tfplan
          retention-days: 7

      - name: Terragrunt apply
        working-directory: terraform/environments/staging
        run: terragrunt apply -auto-approve "${GITHUB_WORKSPACE}/tfplan"

      - name: Create CodeDeploy deployments
        id: codedeploy
        run: |
          BACKEND_TD=$(aws ecs describe-task-definition \
            --task-definition $BACKEND_SERVICE \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          FRONTEND_TD=$(aws ecs describe-task-definition \
            --task-definition $FRONTEND_SERVICE \
            --query 'taskDefinition.taskDefinitionArn' --output text)

          deploy() {
            local td=$1 app=$2 group=$3 container=$4 port=$5
            python3 -c "
import subprocess, json
appspec = {'version':1,'Resources':[{'TargetService':{'Type':'AWS::ECS::Service','Properties':{'TaskDefinition':'$td','LoadBalancerInfo':{'ContainerName':'$container','ContainerPort':$port}}}}]}
revision = {'revisionType':'AppSpecContent','appSpecContent':{'content':json.dumps(appspec)}}
r = subprocess.run(['aws','deploy','create-deployment','--application-name','$app','--deployment-group-name','$group','--revision',json.dumps(revision),'--query','deploymentId','--output','text'],capture_output=True,text=True,check=True)
print(r.stdout.strip())
"
          }

          BACKEND_DEPLOY=$(deploy "$BACKEND_TD" "$BACKEND_SERVICE" "$BACKEND_SERVICE-dg" backend 5000)
          FRONTEND_DEPLOY=$(deploy "$FRONTEND_TD" "$FRONTEND_SERVICE" "$FRONTEND_SERVICE-dg" frontend 80)
          echo "backend_deploy_id=$BACKEND_DEPLOY" >> $GITHUB_OUTPUT
          echo "frontend_deploy_id=$FRONTEND_DEPLOY" >> $GITHUB_OUTPUT

      - name: Wait for deployments
        run: |
          aws deploy wait deployment-successful \
            --deployment-id ${{ steps.codedeploy.outputs.backend_deploy_id }}
          aws deploy wait deployment-successful \
            --deployment-id ${{ steps.codedeploy.outputs.frontend_deploy_id }}

      # Staging runs a full API round-trip to confirm the deploy is actually working
      - name: Smoke tests
        run: |
          ALB_DNS=$(aws elbv2 describe-load-balancers \
            --names todo-staging --query 'LoadBalancers[0].DNSName' --output text)

          curl --fail --retry 5 --retry-delay 10 http://$ALB_DNS/api/health

          TOKEN=$(curl -sf -X POST http://$ALB_DNS/api/auth/signup \
            -H 'Content-Type: application/json' \
            -d "{\"username\":\"smoke_${{ github.sha }}\",\"email\":\"smoke@test.com\",\"password\":\"smokepass\"}" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['token'])")

          curl --fail -X POST http://$ALB_DNS/api/todos \
            -H "Authorization: Bearer $TOKEN" \
            -H 'Content-Type: application/json' \
            -d '{"title":"staging smoke test"}'

      - name: Rollback on failure
        if: failure() && steps.save-task-defs.outputs.backend_td != ''
        run: |
          aws deploy stop-deployment \
            --deployment-id ${{ steps.codedeploy.outputs.backend_deploy_id }} \
            --auto-rollback-enabled 2>/dev/null || true
          aws deploy stop-deployment \
            --deployment-id ${{ steps.codedeploy.outputs.frontend_deploy_id }} \
            --auto-rollback-enabled 2>/dev/null || true
          python3 -c "
import subprocess, json
def rollback(td, app, group, container, port):
    appspec = {'version':1,'Resources':[{'TargetService':{'Type':'AWS::ECS::Service','Properties':{'TaskDefinition':td,'LoadBalancerInfo':{'ContainerName':container,'ContainerPort':port}}}}]}
    revision = {'revisionType':'AppSpecContent','appSpecContent':{'content':json.dumps(appspec)}}
    subprocess.run(['aws','deploy','create-deployment','--application-name',app,'--deployment-group-name',group,'--revision',json.dumps(revision)],check=True)
rollback('${{ steps.save-task-defs.outputs.backend_td }}','$BACKEND_SERVICE','$BACKEND_SERVICE-dg','backend',5000)
rollback('${{ steps.save-task-defs.outputs.frontend_td }}','$FRONTEND_SERVICE','$FRONTEND_SERVICE-dg','frontend',80)
" || true

      - name: Log deployment result
        if: always()
        run: |
          aws logs put-log-events \
            --log-group-name /ecs/todo-staging/pipeline \
            --log-stream-name deployments \
            --log-events "[{\"timestamp\":$(date +%s%3N),\"message\":\"Deploy $IMAGE_TAG: ${{ job.status }}\"}]" \
            2>/dev/null || true

  # ── Stage 4: Email notification via AWS SES (always runs) ───────────────────
  notify:
    name: Notify
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [validate, build, deploy]
    if: always()

    permissions:
      id-token: write
      contents: none

    steps:
      - uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4.0.2
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/todo-staging-github-actions
          aws-region: us-east-1

      - name: Send email notification
        run: |
          STATUS="${{ needs.deploy.result }}"
          if [ "$STATUS" = "success" ]; then
            SUBJECT="✅ [staging] Deploy succeeded — ${{ env.IMAGE_TAG }}"
            BODY="The staging deployment completed successfully.\n\nCommit: ${{ github.sha }}\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          else
            SUBJECT="❌ [staging] Deploy FAILED — ${{ env.IMAGE_TAG }}"
            BODY="The staging deployment failed.\n\nStages: validate=${{ needs.validate.result }}, build=${{ needs.build.result }}, deploy=${{ needs.deploy.result }}\n\nCommit: ${{ github.sha }}\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi
          aws ses send-email \
            --from "${{ secrets.NOTIFY_FROM_EMAIL }}" \
            --to "${{ secrets.NOTIFY_TO_EMAIL }}" \
            --subject "$SUBJECT" \
            --text "$BODY" \
            --region us-east-1
