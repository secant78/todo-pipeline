# Checkov policy configuration.
# Each suppression must include a justification; suppressions without one will be removed.
# "soft-fail" is NOT set here — the PR gate enforces hard failure.

skip-check:
  # ALB HTTP listener without HTTPS redirect.
  # HTTPS termination via ACM + Route 53 is a planned addition; HTTP is acceptable
  # while the domain and certificate are not yet provisioned.
  - CKV_AWS_2

  # ALB access logs disabled.
  # S3 access-log buckets incur storage cost in dev/staging. Access logging is
  # enabled manually in the AWS Console for prod until the monitoring module
  # adds a lifecycle-managed log bucket.
  - CKV_AWS_91

  # Lambda function without a dead-letter queue.
  # The secret-rotator Lambda is triggered by Secrets Manager on a rotation
  # schedule. Rotation failures are already surfaced via Secrets Manager events
  # and CloudWatch alarms; a DLQ adds no additional signal.
  - CKV_AWS_116

  # Lambda code-signing policy.
  # Container images are signed with Cosign (Sigstore) and verified at deploy
  # time. Lambda-layer code signing is a separate, deferred control.
  - CKV_AWS_50
  - CKV_AWS_272

  # ECR repositories use AWS-managed encryption (enabled by default in all
  # regions). Customer-managed KMS keys cost $1/month each and provide
  # granular key management not required at this scale; deferred.
  - CKV_AWS_136

  # CloudWatch Log Groups use AWS-managed encryption by default. CMK would
  # satisfy this check but costs $1/month per key; deferred.
  - CKV_AWS_158

  # Secrets Manager secrets use AWS-managed KMS encryption by default.
  # CMK adds $1/month per key and per-API-call charges; deferred.
  - CKV_AWS_149

  # Lambda concurrent execution limit not set on the secret-rotator function.
  # This function runs at most once per rotation period (weekly/monthly);
  # a concurrency limit adds no meaningful protection here.
  - CKV_AWS_115

  # Lambda function not inside a VPC. The JWT secret-rotator calls only the
  # Secrets Manager API (public endpoint) and does not connect to the database
  # directly; VPC placement is not needed and would require a NAT gateway.
  - CKV_AWS_117

  # ALB listeners use HTTP (ports 80 and 8080 CodeDeploy test listener).
  # TLS termination via ACM + Route 53 is planned; no certificate provisioned.
  # Duplicate of CKV_AWS_2 which is already suppressed above.
  - CKV_AWS_103

  # ALB does not redirect HTTP to HTTPS. No ACM certificate provisioned yet.
  - CKV2_AWS_20

  # Security groups (backend, frontend) flagged as not attached to a resource.
  # False positive: they are referenced by aws_ecs_service resources in the
  # ecs module. Checkov cannot detect cross-module resource references.
  - CKV2_AWS_5

  # VPC default security group not explicitly locked down. Requires importing
  # aws_default_security_group into state; no custom resources use the default
  # SG — all application traffic uses explicitly-defined security groups.
  - CKV2_AWS_12

  # VPC flow logging not enabled. Exports to CloudWatch Logs incur storage
  # cost; deferred until a cost-managed log bucket is added to the stack.
  - CKV2_AWS_11

  # ALB not protected by WAF. AWS WAF costs $5/month minimum plus per-request
  # charges; deferred for non-production environments.
  - CKV2_AWS_28

  # EIP not attached to an EC2 instance. False positive: EIPs are attached to
  # NAT Gateways, which Checkov does not recognise as a valid attachment target.
  - CKV2_AWS_19

  # Postgres query logging not enabled. Enabling log_statement='all' adds
  # significant log volume and I/O overhead; deferred.
  - CKV2_AWS_30

  # RDS enhanced monitoring not enabled. Provides per-second OS metrics via
  # a monitoring agent; incurs CloudWatch cost. Deferred.
  - CKV_AWS_118

  # RDS IAM database authentication not enabled. Requires updating the
  # application to obtain IAM tokens instead of a static password; deferred.
  - CKV_AWS_161

  # RDS Multi-AZ disabled. multi_az = false is intentional — standby replica
  # doubles instance cost and is not required for this workload.
  - CKV_AWS_157

  # RDS automated backups disabled (backup_retention_period = 0). This is a
  # demo application; no production data requires point-in-time recovery.
  - CKV_AWS_133

  # RDS security group description attribute not set. AWS security group
  # descriptions are immutable after creation — changing this field forces
  # a destroy+create which fails because the SG is attached to an RDS-managed
  # ENI that only the RDS service can detach. All individual ingress rules
  # already carry descriptions, which is the meaningful security control.
  - CKV_AWS_23
