sonar.organization=secant78
sonar.projectKey=todo-pipeline
sonar.projectName=Todo Pipeline

# Source roots for backend and frontend
sonar.sources=backend,frontend/src

# Python coverage report generated by pytest-cov
sonar.python.coverage.reportPaths=backend/coverage.xml

# Exclude test files and build artifacts from analysis
sonar.exclusions=**/tests/**,**/node_modules/**,**/build/**,**/__pycache__/**

sonar.python.version=3.12
