version: "3.9"

# Local development only — mirrors the production topology without AWS services.
# Run: docker compose up --build
# The app is reachable at http://localhost

services:

  backend:
    build: ./backend
    environment:
      APP_ENV: development
      # SQLite file lives in the named volume below, same as EFS in production
      DB_PATH: /data/todo.db
      JWT_SECRET_KEY: dev-local-secret-not-for-production
    volumes:
      - sqlite-data:/data
      # Mount source for hot-reload during development
      - ./backend:/app
    ports:
      - "5000:5000"
    command: >
      flask --app app run --host 0.0.0.0 --port 5000 --debug
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      args:
        # Point React at the nginx proxy below so /api requests are forwarded
        REACT_APP_API_URL: /api
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  # Named volume persists the SQLite file across `docker compose down` / `up` cycles
  sqlite-data:
