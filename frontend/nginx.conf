server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # React Router — return index.html for any path the client navigates to
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Healthcheck path for the ALB target group
    location /health {
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    # Gzip static assets so the ALB serves them efficiently
    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
}
